<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理ログイン（テスト）</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      max-width: 400px;
      margin: auto;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
    }
    button {
      background: #333;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h2>管理画面ログイン（テスト環境）</h2>

  <form id="loginForm">
    <input type="password" name="password" placeholder="パスワード" required>
    <button type="submit">ログイン</button>
  </form>

  <script>
    // ★ あなたのテスト Worker の URL（書き換え済み）
    const workerBase = "https://framelab-uploader-test.narun091525-b98.workers.dev";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const form = new FormData(e.target);

      const res = await fetch(`${workerBase}/admin-login`, {
        method: "POST",
        body: form,
        credentials: "include", // ←これを追加
      });


      if (res.ok) {
        // ログイン成功 → 管理画面へ
        location.href = `${workerBase}/admin`;
      } else {
        alert("パスワードが違います");
      }
    });
  </script>

</body>
</html>
