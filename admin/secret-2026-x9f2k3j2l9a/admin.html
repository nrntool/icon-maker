<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>FrameLab 管理パネル</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f5f8;
      color: #222;
      line-height: 1.6;
    }

    .admin-card {
      max-width: 420px;
      margin: 2.4em auto;
      background: #fff;
      border-radius: 18px;
      padding: 1.8em 1.4em;
      box-shadow: 0 6px 20px rgba(0, 40, 80, 0.08);
    }

    h1 {
      font-size: 1.4em;
      margin: 0 0 0.4em;
      text-align: center;
    }

    h1::after {
      content: "";
      display: block;
      width: 70px;
      height: 3px;
      background: #999;
      margin: 10px auto 0;
      border-radius: 2px;
    }

    .desc {
      font-size: 0.85em;
      color: #555;
      text-align: center;
      margin-bottom: 1.4em;
    }

    label {
      display: block;
      font-size: 0.9em;
      font-weight: 600;
      margin-bottom: 0.4em;
    }

    input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      padding: 0.7em 0.9em;
      font-size: 0.9em;
      border-radius: 8px;
      border: 1.5px solid #ccc;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    input[type="file"]::-webkit-file-upload-button {
      margin-right: 0.6em;
      padding: 0.6em 1em;
      background: #f2f2f2;
      border: 1px solid #ccc;
      border-radius: 6px;
      color: #333;
      cursor: pointer;
    }

    button {
      width: 100%;
      margin-top: 1.2em;
      padding: 0.9em;
      font-size: 0.95em;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #0078d4;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0, 40, 80, 0.15);
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: #005fa3;
      box-shadow: 0 4px 12px rgba(0, 40, 80, 0.25);
    }

    button:active {
      background: #004f8a;
      transform: scale(0.98);
      box-shadow: 0 2px 6px rgba(0, 40, 80, 0.3);
    }

    .result {
      margin-top: 1.4em;
      font-size: 0.85em;
      padding: 0.8em;
      border-radius: 10px;
      background: #f9fafc;
      border: 1px solid #dde3ee;
      min-height: 2.4em;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="admin-card">
    <h1>FrameLab 管理パネル</h1>
    <p class="desc">
      フレーム画像をアップロードして、<br>
      FrameLab に反映します。
    </p>

    <label for="frameInput">フレーム画像を選択</label>
    <input type="file" id="frameInput" accept="image/png,image/jpeg">

    <button id="uploadBtn">アップロード</button>

    <div id="result" class="result">まだアップロードは実行されていません。</div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
