<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameLab Uploader</title>
  <link rel="stylesheet" href="admin.css" />
</head>

<body>
  <div class="app-card">

    <!-- ヘッダー -->
    <header>
      <h1>FrameLab Uploader</h1>
    </header>

    <p style="font-size: 0.9em; color: #444; margin-top: -0.4em;">
      フレーム画像を GitHub にアップロードできます。
    </p>

    <!-- STEP 1：画像選択 -->
    <label>
      <span class="step-badge">1</span>
      アップロードする画像を選択
    </label>
    <input type="file" id="frameInput" accept="image/*" />

    <!-- サムネイル表示 -->
    <div id="previewBox" style="margin-top: 10px; text-align: center;">
      <img id="previewImage" src="" alt="プレビュー" style="max-width: 100%; display: none; border-radius: 6px;" />
    </div>

    <!-- STEP 2：フレーム名入力 -->
    <label>
      <span class="step-badge">2</span>
      フレーム名を入力
    </label>
    <input type="text" id="frameName" placeholder="例：予約バトル" />

    <!-- STEP 3：アップロード -->
    <button id="uploadBtn">アップロード</button>

    <!-- 結果表示 -->
    <div id="result"></div>

    <!-- ▼ フレーム一覧 -->
    <h2 style="margin-top: 2em; font-size: 1.1em;">登録済みフレーム一覧</h2>

    <div id="frameList" style="margin-top: 1em;">
      読み込み中…
    </div>

  </div>

  <script src="admin.js"></script>
</body>
</html>
