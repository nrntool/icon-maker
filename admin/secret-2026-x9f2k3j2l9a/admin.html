<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameLab Uploader</title>
  <link rel="stylesheet" href="admin.css" />
</head>

<body>

  <!-- ▼ 管理画面帯 -->
  <div class="admin-banner">管理画面</div>

  <div class="app-card">
    <header>
      <h1>FrameLab Uploader</h1>
    </header>

    <p class="subtext">
      フレーム画像を GitHub にアップロードできます。
    </p>

    <!-- STEP 1：画像選択 -->
    <label>
      <span class="step-badge">1</span>
      アップロードする画像を選択
    </label>
    <input type="file" id="frameInput" accept="image/*" />

    <!-- サムネイル表示 -->
    <div id="previewBox">
      <img id="previewImage" src="" alt="プレビュー" />
    </div>

    <!-- STEP 2：フレーム名入力 -->
    <label>
      <span class="step-badge">2</span>
      フレーム名を入力
    </label>
    <input type="text" id="frameName" placeholder="例：予約バトル" />

    <!-- STEP 3：アップロード -->
    <button id="uploadBtn">アップロード</button>

    <!-- 結果表示 -->
    <div id="result"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
