<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameLab Uploader</title>

  <!-- 管理パネル専用CSS -->
  <link rel="stylesheet" href="admin.css" />
</head>

<body>
  <div class="app-card">

    <!-- ヘッダー -->
    <header>
      <h1>FrameLab Uploader</h1>
    </header>

    <!-- 説明文 -->
    <p style="font-size: 0.9em; color: #444; margin-top: -0.4em;">
      フレーム画像を GitHub にアップロードできます。
    </p>

    <!-- STEP 1 -->
    <label>
      <span class="step-badge">1</span>
      アップロードする画像を選択
    </label>
    <input type="file" id="frameInput" accept="image/*" />

    <!-- STEP 2 -->
    <button id="uploadBtn">アップロード</button>

    <!-- 結果表示 -->
    <div id="result"></div>

  </div>

  <!-- 管理パネル用スクリプト -->
  <script src="admin.js"></script>
</body>
</html>
