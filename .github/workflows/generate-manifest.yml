name: Generate manifest.json

on:
  push:
    paths:
      - 'frames/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest.json
        run: |
          mkdir -p frames
          echo "[" > frames/manifest.json
          for f in frames/*.png; do
            name=$(basename "$f")
            label=$(echo "$name" | sed -E 's/^[0-9]+_?//' | sed -E 's/.png$//' | sed 's/_/ /g')
            echo "  {\"path\": \"frames/$name\", \"label\": \"$label\"}," >> frames/manifest.json
          done
          sed -i '$ s/,$//' frames/manifest.json
          echo "]" >> frames/manifest.json
