name: Update manifest

on:
  push:
    paths:
      - 'frames/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate manifest.json
        run: |
          echo "[" > frames/manifest.json
          for f in frames/*; do
            if [[ "$f" == *.png ]]; then
              name=$(basename "$f")
              label=$(echo "$name" | sed -E 's/^[0-9]+_?//' | sed -E 's/.png$//' | sed 's/_/ /g')
              echo "  {\"path\": \"frames/$name\", \"label\": \"$label\"}," >> frames/manifest.json
            fi
          done
          sed -i '$ s/,$//' frames/manifest.json
          echo "]" >> frames/manifest.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add frames/manifest.json
          git commit -m "Update manifest.json" || echo "No changes"
          git push
