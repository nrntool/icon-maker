<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrameLab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>FrameLab</h1>
    <p class="description">画像にフレームを合成して、アイコンを作成できます。</p>
  </header>

  <section class="notice">
    <h2>注意事項</h2>
    <p>
      ・画像はサーバーに保存されません。<br>
      ・ブラウザ内だけで処理されます。
    </p>
  </section>

  <main class="main">
    <label>画像を選択</label>
    <input type="file" id="imageInput" accept="image/*">

    <label>フレームを選択</label>
    <select id="frameSelect">
      <option value="">選択してください</option>
    </select>

    <canvas id="canvas"></canvas>

    <button id="saveBtn" class="btn-save">保存</button>
    <button id="resetBtn" class="btn-reset">リセット</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
