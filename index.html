<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrameLab</title>
  <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

  <h1>FrameLab</h1>
  <p class="description">画像にフレームを合成して、アイコンを作成できます。</p>

  <h2 class="notice-title">注意事項</h2>
  <div class="notice-box">
    ・画像はサーバーに保存されません。<br>
    ・ブラウザ内だけで処理されます。<br>
  </div>

  <div class="container">

    <label>画像を選択</label>
    <input type="file" id="imageInput" accept="image/*">

    <label>フレームを選択</label>
    <select id="frameSelect">
      <option value="">選択してください</option>
    </select>

    <canvas id="canvas"></canvas>

    <button class="btn-save" id="saveBtn">保存</button>
    <button class="btn-reset" id="resetBtn">リセット</button>

  </div>

  <script src="script.js?v=10"></script>
</body>
</html>
