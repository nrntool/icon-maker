<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrameLab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>FrameLab</h1>
  <p class="description">画像をフレームに合わせて調整し、保存できます。</p>

  <div class="notice-box">
    <strong>注意事項</strong><br>
    ・フレーム外の画像は保存時にグレーで塗りつぶされます。<br>
    ・保存画像は高解像度（3倍）で出力されます。<br>
    ・ピンチ操作で拡大縮小、ドラッグで移動できます。
  </div>

  <div class="container">

    <label>画像を選択</label>
    <input type="file" id="imageInput" accept="image/*">

    <label>フレームを選択</label>
    <select id="frameSelect">
      <option value="">選択してください</option>
    </select>

    <canvas id="canvas"></canvas>

    <button class="btn-save" id="saveBtn">保存</button>
    <button class="btn-reset" id="resetBtn">リセット</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
